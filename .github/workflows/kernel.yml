name: Deterministic kernel

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deterministic-kernel-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust kernel on local ARM64
    runs-on: [self-hosted, macOS, ARM64, activechain-ci]
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      # Keep build artifacts scoped to the exact synthetic merge revision under qualification.
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/ci-${{ github.sha }}
      PATH: /Users/johansellstrom/.elan/bin:/opt/homebrew/opt/rustup/bin:/Users/johansellstrom/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Check out the exact revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          clean: true
          fetch-depth: 1
          persist-credentials: false
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup target add --toolchain 1.97.1 \
            aarch64-apple-ios \
            aarch64-apple-ios-sim
      - name: Install pinned Lean toolchain
        run: |
          if ! elan toolchain list | rg --fixed-strings --line-regexp 'leanprover/lean4:v4.32.0'; then
            elan toolchain install leanprover/lean4:v4.32.0
          fi
      - name: Isolate public Docker authentication
        run: |
          ci_docker_config="${RUNNER_TEMP}/activechain-docker-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "${ci_docker_config}/cli-plugins"
          printf '{}\n' > "${ci_docker_config}/config.json"
          for plugin in "${HOME}/.docker/cli-plugins/"*; do
            if [[ -f "${plugin}" && -x "${plugin}" ]]; then
              ln -s "${plugin}" "${ci_docker_config}/cli-plugins/$(basename "${plugin}")"
            fi
          done
          echo "DOCKER_CONFIG=${ci_docker_config}" >> "${GITHUB_ENV}"
      - name: Preflight pinned RISC0 guest builder
        run: |
          ci_builder="activechain-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker buildx create --name "${ci_builder}" --driver docker-container --use
          echo "ACTIVECHAIN_CI_BUILDER=${ci_builder}" >> "${GITHUB_ENV}"
          echo "BUILDX_BUILDER=${ci_builder}" >> "${GITHUB_ENV}"
          docker buildx inspect --bootstrap
          docker buildx version
          docker pull \
            risczero/risc0-guest-builder:r0.1.94.1@sha256:c2f63fdd720337c0727e05c5e1733083baba04c00a864a89b0e3f4f8d92617be
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check all targets
        env:
          # Clippy checks host code; the following test step builds the pinned guest image.
          RISC0_SKIP_BUILD: "1"
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Check no-std kernel target
        run: >-
          cargo check --locked --target aarch64-apple-ios --lib
          -p activechain-action-kernel
          -p activechain-bytecode-verifier
          -p activechain-canonical-codec
          -p activechain-credential
          -p activechain-devnet-kernel
          -p activechain-protocol-types
          -p activechain-protocol-commitment
          -p activechain-principal
          -p activechain-capability
          -p activechain-cash-kernel
          -p activechain-policy-kernel
          -p activechain-object
          -p activechain-object-vm
          -p activechain-state-tree
          -p activechain-transition
      - name: Build executable Lean reference model
        working-directory: formal/lean
        run: lake build
      - name: Prove all Lean and Tamarin models
        run: bash scripts/check-formal-models.sh
      - name: Bounded-model-check the production canonical codec
        run: bash scripts/check-kani-codec.sh
      - name: Bounded-model-check the verifier C ABI
        run: bash scripts/check-kani-verifier-ffi.sh
      - name: Bounded-model-check the bytecode verifier and ObjectVM helpers
        run: bash scripts/check-kani-object-vm.sh
      - name: Bounded-model-check the production consensus schema and shared arithmetic
        run: bash scripts/check-kani-protocol-types.sh
      - name: Bounded-model-check commitment transcript binding
        run: bash scripts/check-kani-commitment.sh
      - name: Prove consensus and economics arithmetic contracts
        run: formal/verus/verify.sh
      - name: Audit implementation traces and differential conformance
        run: bash scripts/check-proof-conformance.sh
      - name: Run tests
        run: cargo test --locked --workspace --all-features
      - name: Run documentation tests
        run: cargo test --locked --workspace --doc
      - name: Build release binaries and libraries
        run: cargo build --locked --workspace --release
      - name: Reproduce and consume Apple distributions
        run: |
          cargo run --locked -p activechain-apple-distribution -- check-headers .
          bash scripts/check-apple-reproducibility.sh "$GITHUB_SHA"
      - name: Run release tests
        run: cargo test --locked --workspace --release
      - name: Rehearse validator processes
        run: bash scripts/rehearse-validator-processes.sh
      - name: Rehearse live process quorum
        run: bash scripts/rehearse-live-process-quorum.sh
      - name: Reproduce canonical vectors
        run: |
          cargo run --locked --quiet -p activechain-vector-generator -- principal-v1 | diff -u testing/vectors/canonical/principal-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- authority-v1 | diff -u testing/vectors/authority/authority-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- credential-v1 | diff -u testing/vectors/credential/credential-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- apl-v1 | diff -u testing/vectors/policy/apl-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- object-transition-v1 | diff -u testing/vectors/object/object-transition-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- state-tree-v1 | diff -u testing/vectors/state/state-tree-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- object-vm-v1 | diff -u testing/vectors/vm/object-vm-v1.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- devnet-block-v1 | diff -u testing/vectors/devnet/devnet-block-v1.txt -
          cargo run --locked --quiet -p activechain-semantic-devnet -- empty-block | diff -u testing/vectors/devnet/empty-block.txt -
          cargo run --locked --quiet -p activechain-application-primitives --example anchor_vector | diff -u testing/vectors/application/external-anchor-v1.txt -
      - name: Cross-check Rust and Lean semantic tables
        run: |
          cargo run --locked --quiet -p activechain-vector-generator -- apl-truth-table | diff -u testing/vectors/policy/apl-truth-table.txt -
          (cd formal/lean && lake exe aplTruthTable) | diff -u testing/vectors/policy/apl-truth-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- credential-status-table | diff -u testing/vectors/credential/credential-status-table.txt -
          (cd formal/lean && lake exe credentialStatusTable) | diff -u testing/vectors/credential/credential-status-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- object-model-table | diff -u testing/vectors/object/object-model-table.txt -
          (cd formal/lean && lake exe objectTable) | diff -u testing/vectors/object/object-model-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- state-tree-model-table | diff -u testing/vectors/state/state-tree-model-table.txt -
          (cd formal/lean && lake exe stateTreeTable) | diff -u testing/vectors/state/state-tree-model-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- object-vm-model-table | diff -u testing/vectors/vm/object-vm-model-table.txt -
          (cd formal/lean && lake exe objectVMTable) | diff -u testing/vectors/vm/object-vm-model-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- nonce-model-table | diff -u testing/vectors/devnet/nonce-model-table.txt -
          (cd formal/lean && lake exe nonceTable) | diff -u testing/vectors/devnet/nonce-model-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- epoch-upgrade-model-table | diff -u testing/vectors/consensus/epoch-upgrade-model-table.txt -
          (cd formal/lean && lake exe epochUpgradeTable) | diff -u testing/vectors/consensus/epoch-upgrade-model-table.txt -
          cargo run --locked --quiet -p activechain-vector-generator -- codec-length-table | diff -u testing/vectors/canonical/length-prefix-table.txt -
          (cd formal/lean && lake exe codecLengthTable) | diff -u testing/vectors/canonical/length-prefix-table.txt -
      - name: Remove isolated BuildKit worker
        if: always() && env.ACTIVECHAIN_CI_BUILDER != ''
        run: docker buildx rm "${ACTIVECHAIN_CI_BUILDER}"
