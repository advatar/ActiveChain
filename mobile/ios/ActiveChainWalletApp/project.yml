name: ActiveChainWallet
options:
  bundleIdPrefix: dev.activechain
  deploymentTarget:
    iOS: "17.0"
targets:
  ActiveChainWallet:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../ActiveChainWallet/Sources/ActiveChainWallet
    settings:
      CODE_SIGN_ENTITLEMENTS: Config/ActiveChainWallet.entitlements
      DEVELOPMENT_TEAM: L2AF8KFX35
      INFOPLIST_KEY_ActiveChainKeychainAccessGroup: "$(AppIdentifierPrefix)dev.activechain.wallet.shared"
      PRODUCT_BUNDLE_IDENTIFIER: dev.activechain.wallet
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_MODULE_NAME: ActiveChainWalletApp
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: ActiveChain Wallet
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - framework: ../../../dist/apple/current/ActiveChainWallet.xcframework
        embed: false
    scheme:
      testTargets:
        - ActiveChainWalletTests
  ActiveChainWalletMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
      - path: ../ActiveChainWallet/Sources/ActiveChainWallet
    settings:
      CODE_SIGN_ENTITLEMENTS: Config/ActiveChainWalletMac.entitlements
      DEVELOPMENT_TEAM: L2AF8KFX35
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_ActiveChainKeychainAccessGroup: "$(AppIdentifierPrefix)dev.activechain.wallet.shared"
      INFOPLIST_KEY_CFBundleDisplayName: ActiveChain Wallet
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
      PRODUCT_BUNDLE_IDENTIFIER: dev.activechain.wallet.macos
      MARKETING_VERSION: 0.1.0
      CURRENT_PROJECT_VERSION: 1
      PRODUCT_MODULE_NAME: ActiveChainWalletApp
      SWIFT_VERSION: "5.9"
    dependencies:
      - framework: ../../../dist/apple/current/ActiveChainWallet.xcframework
        embed: false
    scheme:
      testTargets:
        - ActiveChainWalletMacTests
  ActiveChainWalletTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: ActiveChainWallet
  ActiveChainWalletMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    settings:
      PRODUCT_MODULE_NAME: ActiveChainWalletMacTests
      SWIFT_VERSION: "5.9"
    dependencies:
      - target: ActiveChainWalletMac
