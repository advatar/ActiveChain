name: Amber
options:
  bundleIdPrefix: dev.activechain
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
targets:
  Amber:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.activechain.amber
        PRODUCT_MODULE_NAME: AmberApp
        INFOPLIST_KEY_CFBundleDisplayName: Amber
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
    scheme:
      testTargets:
        - AmberTests
  AmberMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.activechain.amber.macos
        PRODUCT_MODULE_NAME: AmberApp
        INFOPLIST_KEY_CFBundleDisplayName: Amber
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
    scheme:
      testTargets:
        - AmberMacTests
  AmberTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Amber
  AmberMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_MODULE_NAME: AmberMacTests
    dependencies:
      - target: AmberMac
